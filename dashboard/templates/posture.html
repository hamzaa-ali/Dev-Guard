{% extends "base.html" %}
{% block title %}Posture Score{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2><i class="fas fa-chart-line"></i> Security Posture Score</h2>
        <p>Track your codebase security health over time</p>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3><i class="fas fa-chart-area"></i> Score Trend</h3>
    </div>
    <div class="empty-state">
        <i class="fas fa-chart-line empty-icon"></i>
        <p>No posture history yet</p>
        <span>Complete at least two scans to see your trend line</span>
    </div>
</div>
{% endblock %}
